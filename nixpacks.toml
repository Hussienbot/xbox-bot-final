[phases.setup]
nixPkgs = [
  "libx11", "libxcb", "libxrandr", "libxcomposite", "libxcursor",
  "libxdamage", "libxext", "libxfixes", "libxi", "libxrender",
  "libxss", "libxtst", "libglib2.0", "libnss3", "libdbus-1",
  "libgdk-pixbuf2.0", "libgtk-3", "libcups2", "libatk-bridge2.0",
  "libasound2", "libatspi2.0", "libdrm", "libgbm", "libxshmfence"
]

[phases.install]
cmds = [
  "pip install -r requirements.txt",
  "playwright install chromium"
]

[phases.start]
cmd = "python app.py"
